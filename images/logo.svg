<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 340" role="img" aria-label="SKY Campus Germany">
  <defs>
    <style>
      .sky-text {
        font-family: 'Nunito', 'Arial Rounded MT Bold', 'Varela Round', Arial, sans-serif;
        font-weight: 900;
        font-size: 164px;
        fill: #4A8FE8;
        letter-spacing: -4px;
      }
      .campus-text {
        font-family: 'Nunito', Arial, sans-serif;
        font-weight: 700;
        font-size: 38px;
        fill: #4A8FE8;
        letter-spacing: 8px;
      }
      .germany-text {
        font-family: 'Nunito', Arial, sans-serif;
        font-weight: 800;
        font-size: 34px;
        fill: #ffffff;
        letter-spacing: 7px;
      }
    </style>
  </defs>
  <!-- sky wordmark -->
  <text x="160" y="188" class="sky-text" text-anchor="middle">sky</text>
  <!-- CAMPUS -->
  <text x="160" y="232" class="campus-text" text-anchor="middle">CAMPUS</text>
  <!-- GERMANY bar -->
  <rect x="10" y="248" width="300" height="72" rx="6" fill="#4A8FE8"/>
  <text x="160" y="297" class="germany-text" text-anchor="middle">GERMANY</text>
</svg>
